services:
  # 后端 Python API
  api:
    build: .
    container_name: dev-ops-mcp-api
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - /root/.ssh/id_rsa:/root/.ssh/id_rsa:ro
    networks:
      - dev-ops-mcp-network

  # 前端 Node.js Server
  web:
    build: ./web
    container_name: dev-ops-mcp-web
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - dev-ops-mcp-network

  # Nginx 总入口
  gateway:
    image: nginx:alpine
    container_name: dev-ops-mcp-gateway
    ports:
      - "10096:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - dev-ops-mcp-network

networks:
  dev-ops-mcp-network:
    driver: bridge
