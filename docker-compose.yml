services:
  # 后端 Python API
  api:
    build: .
    container_name: bot-backend
    env_file: .env
    networks:
      - bot-network

  # 前端 Node.js Server
  web:
    build: ./web
    container_name: bot-frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - bot-network

  # Nginx 总入口
  gateway:
    image: nginx:alpine
    container_name: bot-gateway
    ports:
      - "10093:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge